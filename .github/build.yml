name: Generate AutoTouch Dylib Zip
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_dylib:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Theos Environment
      run: |
        bash -c "$(curl -fsSL https://githubusercontent.com)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH
        mkdir -p ~/theos/sdks
        curl -L https://github.com | tar -xf - -C ~/theos/sdks/

    - name: Compile Project to Dylib
      run: |
        export THEOS=~/theos
        make FINALPACKAGE=1
        
        # إنشاء مجلد مستقل لوضع ملف الـ dylib الناتج وضغطه بصيغة ZIP
        mkdir -p AutoTouchOutput
        cp -r .theos/obj/debug/AutoTouchCore.dylib AutoTouchOutput/ 2>/dev/null || true
        cp -r .theos/obj/AutoTouchCore.dylib AutoTouchOutput/ 2>/dev/null || true
        cp -r .theos/obj/debug/AutoTouchMenu.dylib AutoTouchOutput/ 2>/dev/null || true
        cp -r .theos/obj/AutoTouchMenu.dylib AutoTouchOutput/ 2>/dev/null || true
        
        # أمر الضغط الفعلي للمجلد ليتحول لملف zip قابل للتحميل من الآيفون
        zip -r MyAutoTouchPackage.zip AutoTouchOutput

    - name: Send Zip File to iPhone
      uses: actions/upload-artifact@v4
      with:
        name: Complete-AutoTouch-Zip
        path: MyAutoTouchPackage.zip

