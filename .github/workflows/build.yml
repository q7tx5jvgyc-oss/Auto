name: AutoTouch Dylib Builder
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_job:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Tweak Files Internally
      run: |
        # 1. ملف التحكم الخاص بالسيديات (Control File)
        cat << 'EOF' > control
        Package: com.mustache.fasttouch
        Name: Mustache Ultra Fast AutoTouch
        Depends: mobilesubstrate, rocketbootstrap
        Version: 2.0.0
        Architecture: iphoneos-arm64
        Description: ماكرو موستاش الخارق ونقرات مادية حقيقية فائقة السرعة بدون فريز
        Maintainer: Mustache Developer
        Author: Mustache
        Section: Tweaks
        EOF

        # 2. ملف التجميع والربط البرمجي العميق (Makefile)
        cat << 'EOF' > Makefile
        TARGET := iphone:clang:latest:14.0
        ARCHS := arm64 arm64e

        include $(THEOS)/makefiles/common.mk

        TWEAK_NAME = MustacheFastTouch
        MustacheFastTouch_FILES = main.mm
        MustacheFastTouch_CFLAGS = -fobjc-arc
        MustacheFastTouch_FRAMEWORKS = UIKit CoreGraphics QuartzCore
        MustacheFastTouch_PRIVATE_FRAMEWORKS = IOKit
        MustacheFastTouch_LIBRARIES = rocketbootstrap

        include $(THEOS_MAKE_PATH)/tweak.mk
        EOF

        # 3. ملف الكود المصدري البرمجي الخارق والمعدل بالكامل
        cat << 'EOF' > main.mm
        #import <UIKit/UIKit.h>
        #import <CoreGraphics/CoreGraphics.h>
        #import <QuartzCore/QuartzCore.h>
        #import <mach/mach_time.h>

        // استدعاء المكونات المادية لنظام اللمس الفعلي في الـ iOS
        typedef uint32_t IOHIDDigitizerTransducerType;
        extern "C" {
            CFTypeRef IOHIDEventCreateDigitizerFingerEvent(CFAllocatorRef allocator, uint64_t timeStamp, uint32_t index, uint32_t identity, uint32_t eventMask, float x, float y, float z, float tipPressure, float twist, objc_bool isInRange, objc_bool isTouched, uint32_t options);
            void ISendHIDEvent(CFTypeRef event);
        }

        // إعداد خادم تواصل سريع جداً لحقن اللمس داخل الـ SpringBoard بدون فريز
        extern "C" int RocketBootstrap_Direct_com_apple_springboard();

        @interface MustacheTargetView : UIView
        @property (nonatomic, strong) UILabel *numberLabel;
        @property (nonatomic, assign) CGPoint targetPoint;
        @end

        @implementation MustacheTargetView
        - (instancetype)initWithFrame:(CGRect)frame index:(NSInteger)index {
            self = [super initWithFrame:frame];
            if (self) {
                self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.75];
                self.layer.cornerRadius = frame.size.width / 2;
                self.layer.borderColor = [UIColor whiteColor].CGColor;
                self.layer.borderWidth = 2.5;
                self.userInteractionEnabled = YES;
                
                self.numberLabel = [[UILabel alloc] initWithFrame:self.bounds];
                self.numberLabel.text = [NSString stringWithFormat:@"%ld", (long)index];
                self.numberLabel.textColor = [UIColor whiteColor];
                self.numberLabel.textAlignment = NSTextAlignmentCenter;
                self.numberLabel.font = [UIFont boldSystemFontOfSize:14];
                [self addSubview:self.numberLabel];
                
                UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleTargetPan:)];
                [self addGestureRecognizer:pan];
            }
            return self;
        }

        - (void)handleTargetPan:(UIPanGestureRecognizer *)sender {
            CGPoint translation = [sender translationInView:self.superview];
            self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
            [sender setTranslation:CGPointMake(0, 0) inView:self.superview];
            self.targetPoint = self.center;
        }
        @end

        @interface MustacheWindow : UIWindow
        @property (nonatomic, strong) UIButton *floatingButton;
        @property (nonatomic, strong) UIView *menuView;
        @property (nonatomic, strong) UISlider *speedSlider;
        @property (nonatomic, strong) UILabel *speedLabel;
        @property (nonatomic, strong) UIButton *toggleButton;
        @property (nonatomic, strong) NSMutableArray<MustacheTargetView *> *targetsArray;
        @property (nonatomic, assign) BOOL isRunning;
        @property (nonatomic, assign) float clickInterval;
        @property (nonatomic, strong) dispatch_source_t fastTimer; // استخدام GCD Timer الخارق للسرعات العالية جداً
        @end

        @implementation MustacheWindow

        - (instancetype)init {
            // النافذة تبدأ بحجم الزر فقط لتفادي حظر اللمس وحل مشكلة الفريز نهائياً
            self = [super initWithFrame:CGRectMake(40, 200, 75, 45)];
            if (self) {
                self.windowLevel = UIWindowLevelAlert + 500.0; // فوق جميع النوافذ والألعاب
                self.backgroundColor = [UIColor clearColor];
                self.clipsToBounds = NO;
                [self setHidden:NO];
                
                self.isRunning = NO;
                self.clickInterval = 0.1; // افتراضي سريع جداً 100 ملي ثانية
                self.targetsArray = [[NSMutableArray alloc] init];
                
                [self createFloatingButton];
                [self createMenuView];
            }
            return self;
        }

        // تفعيل التحكم الكامل بالشاشة الخلفية وحرية تحريك الأزرار واللعب بسلاسة
        - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
            UIView *hitView = [super hitTest:point withEvent:event];
            if (hitView == self.floatingButton || [hitView isDescendantOfView:self.menuView] || [hitView isKindOfClass:[MustacheTargetView class]]) {
                return hitView;
            }
            return nil; // تمرير فوري للمس إلى اللعبة بدون أي تأخير أو فريز
        }

        - (void)createFloatingButton {
            self.floatingButton = [UIButton buttonWithType:UIButtonTypeCustom];
            self.floatingButton.frame = CGRectMake(0, 0, 75, 45);
            self.floatingButton.backgroundColor = [UIColor blackColor];
            [self.floatingButton setTitle:@"موستاش" forState:UIControlStateNormal];
            [self.floatingButton setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
            self.floatingButton.titleLabel.font = [UIFont boldSystemFontOfSize:13];
            self.floatingButton.layer.cornerRadius = 12;
            self.floatingButton.layer.borderWidth = 2.0;
            self.floatingButton.layer.borderColor = [UIColor whiteColor].CGColor;
            
            UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleButtonPan:)];
            [self.floatingButton addGestureRecognizer:pan];
            [self.floatingButton addTarget:self action:@selector(toggleMenuVisibility) forControlEvents:UIControlEventTouchUpInside];
            
            [self addSubview:self.floatingButton];
        }

        - (void)handleButtonPan:(UIPanGestureRecognizer *)sender {
            CGPoint translation = [sender translationInView:self.superview];
            self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
            [sender setTranslation:CGPointMake(0, 0) inView:self.superview];
        }

        - (void)createMenuView {
            self.menuView = [[UIView alloc] initWithFrame:CGRectMake(0, 55, 260, 260)];
            self.menuView.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.96];
            self.menuView.layer.cornerRadius = 16;
            self.menuView.layer.borderColor = [UIColor whiteColor].CGColor;
            self.menuView.layer.borderWidth = 2.0;
            self.menuView.hidden = YES;
            
            UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 12, 240, 25)];
            titleLabel.text = @"🚀 MUSTACHE SPEED MOD";
            titleLabel.textColor = [UIColor whiteColor];
            titleLabel.textAlignment = NSTextAlignmentCenter;
            titleLabel.font = [UIFont boldSystemFontOfSize:14];
            [self.menuView addSubview:titleLabel];
            
            UIButton *addTargetBtn = [UIButton buttonWithType:UIButtonTypeCustom];
            addTargetBtn.frame = CGRectMake(30, 50, 200, 38);
            addTargetBtn.backgroundColor = [UIColor whiteColor];
            [addTargetBtn setTitle:@"➕ اضافه هدف" forState:UIControlStateNormal];
            [addTargetBtn setTitleColor: [UIColor blackColor] forState:UIControlStateNormal];
            addTargetBtn.titleLabel.font = [UIFont boldSystemFontOfSize:13];
            addTargetBtn.layer.cornerRadius = 8;
            [addTargetBtn addTarget:self action:@selector(addNewTarget) forControlEvents:UIControlEventTouchUpInside];
            [self.menuView addSubview:addTargetBtn];
            
            // شريط تحكم خارق بالسرعة يبدأ من أجزاء الملي ثانية
            self.speedSlider = [[UISlider alloc] initWithFrame:CGRectMake(30, 110, 200, 30)];
            self.speedSlider.minimumValue = 0.001; // سرعة جنونية (1 ملي ثانية)
            self.speedSlider.maximumValue = 1.0;
            self.speedSlider.value = 0.1;
            self.speedSlider.tintColor = [UIColor whiteColor];
            [self.speedSlider addTarget:self action:@selector(speedChanged:) forControlEvents:UIControlEventValueChanged];
            [self.menuView addSubview:self.speedSlider];
            
            self.speedLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 145, 240, 20)];
            self.speedLabel.text = @"معدل النقر: 0.10 ثانية";
            self.speedLabel.textColor = [UIColor lightGrayColor];
            self.speedLabel.textAlignment = NSTextAlignmentCenter;
            self.speedLabel.font = [UIFont systemFontOfSize:11];
            [self.menuView addSubview:self.speedLabel];
