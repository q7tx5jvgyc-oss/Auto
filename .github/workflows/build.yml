name: AutoTouch Dual Component Builder
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_job:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Project Directories and Write 7 Code Files
      run: |
        # 1. إنشاء ملف التحكم الخاص بالسيديات (control)
        cat << 'EOF' > control
        Package: com.mustache.realautotouch
        Name: Mustache AutoTouch Pro
        Depends: mobilesubstrate, rocketbootstrap
        Version: 1.0.0
        Architecture: iphoneos-arm64
        Description: ماكرو موستاش الاحترافي - واجهة عائمة منفصلة وخادم نقرات حقيقي 100%
        Maintainer: Mustache Developer
        Author: Mustache
        Section: Tweaks
        EOF

        # 2. إنشاء ملف الفلتر للواجهة العائمة (MustacheAutoTouchUI.plist)
        cat << 'EOF' > MustacheAutoTouchUI.plist
        {
            Filter = {
                Bundles = ( "com.apple.springboard" );
            };
        }
        EOF

        # 3. إنشاء ملف التجميع والتنسيق (Makefile)
        cat << 'EOF' > Makefile
        TARGET := iphone:clang:latest:14.0
        ARCHS := arm64 arm64e

        include $(THEOS)/makefiles/common.mk

        # تجميع الواجهة العائمة
        TWEAK_NAME = MustacheAutoTouchUI
        MustacheAutoTouchUI_FILES = TweakUI.mm
        MustacheAutoTouchUI_CFLAGS = -fobjc-arc
        MustacheAutoTouchUI_FRAMEWORKS = UIKit CoreGraphics QuartzCore
        MustacheAutoTouchUI_LIBRARIES = rocketbootstrap

        # تجميع خادم النقرات المادية الخلفي
        TOOL_NAME = mustache_touch_daemon
        mustache_touch_daemon_FILES = daemon.mm
        mustache_touch_daemon_CFLAGS = -fobjc-arc
        mustache_touch_daemon_PRIVATE_FRAMEWORKS = IOKit

        include $(THEOS_MAKE_PATH)/tweak.mk
        include $(THEOS_MAKE_PATH)/tool.mk
        EOF

        # 4. إنشاء كود الواجهة العائمة والأهداف (TweakUI.mm)
        cat << 'EOF' > TweakUI.mm
        #import <UIKit/UIKit.h>
        #import <CoreGraphics/CoreGraphics.h>

        @interface MustacheTarget : UIView
        @property (nonatomic, assign) CGPoint actualPoint;
        @end

        @implementation MustacheTarget
        - (instancetype)initWithFrame:(CGRect)frame index:(NSInteger)index {
            self = [super initWithFrame:frame];
            if (self) {
                self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.7];
                self.layer.cornerRadius = frame.size.width / 2;
                self.layer.borderColor = [UIColor whiteColor].CGColor;
                self.layer.borderWidth = 2.0;
                
                UILabel *lbl = [[UILabel alloc] initWithFrame:self.bounds];
                lbl.text = [NSString stringWithFormat:@"%ld", (long)index];
                lbl.textColor = [UIColor whiteColor];
                lbl.textAlignment = NSTextAlignmentCenter;
                [self addSubview:lbl];
                
                UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(moveTarget:)];
                [self addGestureRecognizer:pan];
            }
            return self;
        }
        - (void)moveTarget:(UIPanGestureRecognizer *)sender {
            CGPoint trans = [sender translationInView:self.superview];
            self.center = CGPointMake(self.center.x + trans.x, self.center.y + trans.y);
            [sender setTranslation:CGPointMake(0, 0) inView:self.superview];
            self.actualPoint = self.center;
        }
        @end

        @interface MustacheUIWindow : UIWindow
        @property (nonatomic, strong) UIButton *floatBtn;
        @property (nonatomic, strong) UIView *menuView;
        @property (nonatomic, strong) NSMutableArray<MustacheTarget *> *targets;
        @property (nonatomic, assign) float speed;
        @property (nonatomic, assign) BOOL running;
        @property (nonatomic, strong) NSTimer *sendTimer;
        @end

        @implementation MustacheUIWindow
        - (instancetype)init {
            self = [super initWithFrame:CGRectMake(30, 200, 80, 50)];
            if (self) {
                self.windowLevel = UIWindowLevelAlert + 100.0;
                self.backgroundColor = [UIColor clearColor];
                self.clipsToBounds = NO;
                [self setHidden:NO];
                
                self.targets = [[NSMutableArray alloc] init];
                self.speed = 0.1;
                self.running = NO;
                
                [self setupUI];
            }
            return self;
        }
        - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
            UIView *view = [super hitTest:point withEvent:event];
            if (view == self.floatBtn || [view isDescendantOfView:self.menuView] || [view isKindOfClass:[MustacheTarget class]]) {
                return view;
            }
            return nil; // تمرير اللمس للخلفية فوراً لمنع الفريز وحل مشكلة التحكم بالكامل
        }
        - (void)setupUI {
            self.floatBtn = [UIButton buttonWithType:UIButtonTypeCustom];
            self.floatBtn.frame = self.bounds;
            self.floatBtn.backgroundColor = [UIColor blackColor];
            [self.floatBtn setTitle:@"موستاش" forState:UIControlStateNormal];
            self.floatBtn.layer.cornerRadius = 12;
            self.floatBtn.layer.borderWidth = 2.0;
            self.floatBtn.layer.borderColor = [UIColor whiteColor].CGColor;
            
            UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(moveBtn:)];
            [self.floatBtn addGestureRecognizer:pan];
            [self.floatBtn addTarget:self action:@selector(clickMenu) forControlEvents:UIControlEventTouchUpInside];
            [self addSubview:self.floatBtn];
            
            self.menuView = [[UIView alloc] initWithFrame:CGRectMake(0, 60, 240, 200)];
            self.menuView.backgroundColor = [UIColor blackColor];
            self.menuView.layer.cornerRadius = 12;
            self.menuView.hidden = YES;
            
            UIButton *addBtn = [[UIButton alloc] initWithFrame:CGRectMake(20, 20, 200, 35)];
            addBtn.backgroundColor = [UIColor whiteColor];
            [addBtn setTitle:@"➕ اضافه هدف" forState:UIControlStateNormal];
            [addBtn setTitleColor:[UIColor blackColor] forState:UIControlStateNormal];
            [addBtn addTarget:self action:@selector(addTargetPoint) forControlEvents:UIControlEventTouchUpInside];
            [self.menuView addSubview:addBtn];
            
            UIButton *playBtn = [[UIButton alloc] initWithFrame:CGRectMake(20, 130, 200, 40)];
            playBtn.backgroundColor = [UIColor whiteColor];
            [playBtn setTitle:@"▶️ تشغيل" forState:UIControlStateNormal];
            [playBtn setTitleColor:[UIColor blackColor] forState:UIControlStateNormal];
            [playBtn addTarget:self action:@selector(startStop:) forControlEvents:UIControlEventTouchUpInside];
            [self.menuView addSubview:playBtn];
            
            [self addSubview:self.menuView];
        }
        - (void)moveBtn:(UIPanGestureRecognizer *)sender {
            CGPoint trans = [sender translationInView:self.superview];
            self.center = CGPointMake(self.center.x + trans.x, self.center.y + trans.y);
            [sender setTranslation:CGPointMake(0, 0) inView:self.superview];
        }
        - (void)clickMenu { self.menuView.hidden = !self.menuView.hidden; }
        - (void)addTargetPoint {
            MustacheTarget *t = [[MustacheTarget alloc] initWithFrame:CGRectMake(10, 70, 35, 35) index:self.targets.count + 1];
            t.actualPoint = [self convertPoint:t.center toView:nil];
            [self addSubview:t];
            [self.targets addObject:t];
        }
        - (void)startStop:(UIButton *)sender {
            if (self.running) {
                [self.sendTimer invalidate];
                [sender setTitle:@"▶️ تشغيل" forState:UIControlStateNormal];
            } else {
                self.sendTimer = [NSTimer scheduledTimerWithTimeInterval:self.speed repeats:YES block:^(NSTimer *timer) {
                    for (MustacheTarget *t in self.targets) {
                        CGPoint p = [t convertPoint:CGPointMake(17.5, 17.5) toView:nil];
                        NSString *urlStr = [NSString stringWithFormat:@"http://127.0.0", p.x, p.y];
                        NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:urlStr]];
                        [req setHTTPMethod:@"GET"];
                        [[[NSURLSession sharedSession] dataTaskWithRequest:req completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {}] resume];
                    }
                }];
                [sender setTitle:@"⏸️ إيقاف" forState:UIControlStateNormal];
            }
            self.running = !self.running;
        }
        @end

        static void __attribute__((constructor)) initUI() {
            dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(3.0 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                static MustacheUIWindow *win = nil;
                win = [[MustacheUIWindow alloc] init];
            });
        }
        EOF

        # 5. إنشاء كود خادم النقرات المادية الخلفي الحقيقي (daemon.mm)
        cat << 'EOF' > daemon.mm
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <sys/socket.h>
        #include <netinet/in.h>
        #import <Foundation/Foundation.h>
        #import <mach/mach_time.h>

        extern "C" {
            CFTypeRef IOHIDEventCreateDigitizerFingerEvent(CFAllocatorRef allocator, uint64_t timeStamp, uint32_t index, uint32_t identity, uint32_t eventMask, float x, float y, float z, float tipPressure, float twist, objc_bool isInRange, objc_bool isTouched, uint32_t options);
            void ISendHIDEvent(CFTypeRef event);
        }

