name: Mustache Pro AutoTouch Ultimate
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_job:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Construct Project Files
      run: |
        # 1. إنشاء ملف البيانات الوصفية (control)
        cat << 'EOF' > control
        Package: com.mustache.ultimateautotouch
        Name: Mustache AutoTouch Ultimate
        Depends: mobilesubstrate
        Version: 5.1.0
        Architecture: iphoneos-arm64
        Description: ماكرو موستاش النهائي - نقرات مادية حقيقية للشاشة والالعاب وتصفح كامل للخلفية وتعدد اهداف مرقمة
        Maintainer: Mustache Developer
        Author: Mustache
        Section: Tweaks
        EOF

        # 2. إنشاء ملف التوجيه والفلتر ليعمل فوق النظام والالعاب (plist)
        cat << 'EOF' > MustacheUltimateTouch.plist
        {
            Filter = {
                Bundles = ( "com.apple.springboard", "com.apple.UIKit" );
            };
        }
        EOF

        # 3. إنشاء ملف التجمع الـ Makefile لربط الواجهة بنواة نظام التشغيل
        cat << 'EOF' > Makefile
        TARGET := iphone:clang:latest:14.0
        ARCHS := arm64 arm64e

        include $(THEOS)/makefiles/common.mk

        TWEAK_NAME = MustacheUltimateTouch
        MustacheUltimateTouch_FILES = main.mm
        MustacheUltimateTouch_CFLAGS = -fobjc-arc
        MustacheUltimateTouch_FRAMEWORKS = UIKit CoreGraphics QuartzCore
        MustacheUltimateTouch_PRIVATE_FRAMEWORKS = IOKit

        include $(THEOS_MAKE_PATH)/tweak.mk
        EOF

        # 4. كتابة ملف البرمجة المتكامل والنهائي (main.mm) يحل مشكلة اللمس والفريز تماماً
        cat << 'EOF' > main.mm
        #import <UIKit/UIKit.h>
        #import <CoreGraphics/CoreGraphics.h>
        #import <QuartzCore/QuartzCore.h>
        #import <mach/mach_time.h>

        // استدعاء نظام الأحداث الفيزيائية العميقة للـ iOS لحقن اللمس الفعلي
        typedef uint32_t IOHIDDigitizerTransducerType;
        extern "C" {
            CFTypeRef IOHIDEventCreateDigitizerFingerEvent(CFAllocatorRef allocator, uint64_t timeStamp, uint32_t index, uint32_t identity, uint32_t eventMask, float x, float y, float z, float tipPressure, float twist, objc_bool isInRange, objc_bool isTouched, uint32_t options);
            void IOHIDEventSystemClientQueueEvent(CFTypeRef client, CFTypeRef event);
            CFTypeRef IOHIDEventSystemClientCreate(CFAllocatorRef allocator);
        }

        // كود بناء الأهداف المتعددة المرقمة القابلة للسحب طوال الوقت
        @interface MustacheTargetNode : UIView
        @property (nonatomic, assign) CGPoint absolutePoint;
        @property (nonatomic, strong) UILabel *numberLabel;
        @end

        @implementation MustacheTargetNode
        - (instancetype)initWithFrame:(CGRect)frame index:(NSInteger)index {
            self = [super initWithFrame:frame];
            if (self) {
                self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                self.layer.cornerRadius = frame.size.width / 2;
                self.layer.borderColor = [UIColor whiteColor].CGColor;
                self.layer.borderWidth = 2.5;
                self.userInteractionEnabled = YES;
                
                // عرض رقم الهدف المتعدد في المنتصف بوضوح (1, 2, 3...)
                self.numberLabel = [[UILabel alloc] initWithFrame:self.bounds];
                self.numberLabel.text = [NSString stringWithFormat:@"%ld", (long)index];
                self.numberLabel.textColor = [UIColor whiteColor];
                self.numberLabel.textAlignment = NSTextAlignmentCenter;
                self.numberLabel.font = [UIFont boldSystemFontOfSize:14];
                [self addSubview:self.numberLabel];
                
                UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleNodePan:)];
                [self addGestureRecognizer:pan];
            }
            return self;
        }

        - (void)handleNodePan:(UIPanGestureRecognizer *)sender {
            CGPoint translation = [sender translationInView:self.superview];
            self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
            [sender setTranslation:CGPointMake(0, 0) inView:self.superview];
            
            // تحويل الإحداثيات بالنسبة للشاشة الكاملة ومطابقتها مع اللعبة الخلفية
            self.absolutePoint = [self convertPoint:CGPointMake(self.bounds.size.width/2, self.bounds.size.height/2) toView:nil];
        }
        @end

        // كود الواجهة والزر العائم وقائمة تحكم مود موستاش
        @interface MustacheCoreWindow : UIWindow
        @property (nonatomic, strong) UIButton *floatingButton;
        @property (nonatomic, strong) UIView *menuView;
        @property (nonatomic, strong) UISlider *speedSlider;
        @property (nonatomic, strong) UILabel *speedLabel;
        @property (nonatomic, strong) UIButton *toggleButton;
        @property (nonatomic, strong) NSMutableArray<MustacheTargetNode *> *targetsCollection;
        @property (nonatomic, assign) BOOL isMacroRunning;
        @property (nonatomic, assign) float clickInterval;
        @property (nonatomic, strong) dispatch_source_t highSpeedTimer;
        @property (nonatomic, assign) CFTypeRef hidSystemClient;
        @end

        @implementation MustacheCoreWindow

        - (instancetype)init {
            // حل مشكلة التجميد (Freeze): حجم النافذة يطابق حجم الزر فقط لعدم حظر مستشعرات اللعبة الخلفية
            self = [super initWithFrame:CGRectMake(40, 220, 75, 45)];
            if (self) {
                self.windowLevel = UIWindowLevelAlert + 1000.0; // أعلى طبقة عرض للتفوق على شاشات الألعاب
                self.backgroundColor = [UIColor clearColor];
                self.clipsToBounds = NO; // لظهور الأهداف والقائمة المنسدلة في أي مكان
                [self setHidden:NO];
                
                self.targetsCollection = [[NSMutableArray alloc] init];
                self.clickInterval = 0.10;
                self.isMacroRunning = NO;
                
                // تهيئة محرك اللمس الفيزيائي للنظام
                self.hidSystemClient = IOHIDEventSystemClientCreate(kCFAllocatorDefault);
                
                [self createFloatingTrigger];
                [self createMustacheMenu];
            }
            return self;
        }

        // تمرير اللمس وحل مشكلة عدم التحكم بالخلفية نهائياً 100%
        - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
            UIView *touchResponder = [super hitTest:point withEvent:event];
            // اللمس يتفاعل فقط مع الزر العائم وقائمته والأهداف، وأي مساحة باللعبة تظل حرة تماماً لتلعب بسلاسة
            if (touchResponder == self.floatingButton || [touchResponder isDescendantOfView:self.menuView] || [touchResponder isKindOfClass:[MustacheTargetNode class]]) {
                return touchResponder;
            }
            return nil;
        }

        - (void)createFloatingTrigger {
            self.floatingButton = [UIButton buttonWithType:UIButtonTypeCustom];
            self.floatingButton.frame = self.bounds;
            self.floatingButton.backgroundColor = [UIColor blackColor];
            [self.floatingButton setTitle:@"موستاش" forState:UIControlStateNormal];
            [self.floatingButton setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
            self.floatingButton.titleLabel.font = [UIFont boldSystemFontOfSize:13];
            self.floatingButton.layer.cornerRadius = 12;
            self.floatingButton.layer.borderWidth = 2.0;
            self.floatingButton.layer.borderColor = [UIColor whiteColor].CGColor;
            
            UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleButtonPan:)];
            [self.floatingButton addGestureRecognizer:pan];
            [self.floatingButton addTarget:self action:@selector(toggleMenuDisplay) forControlEvents:UIControlEventTouchUpInside];
            
            [self addSubview:self.floatingButton];
        }

        - (void)handleButtonPan:(UIPanGestureRecognizer *)sender {
            CGPoint translation = [sender translationInView:self.superview];
            self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
            [sender setTranslation:CGPointMake(0, 0) inView:self.superview];
        }

        - (void)toggleMenuDisplay {
            self.menuView.hidden = !self.menuView.hidden;
        }

        - (void)createMustacheMenu {
            self.menuView = [[UIView alloc] initWithFrame:CGRectMake(0, 55, 250, 270)];
            self.menuView.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.96];
            self.menuView.layer.cornerRadius = 15;
            self.menuView.layer.borderColor = [UIColor whiteColor].CGColor;
            self.menuView.layer.borderWidth = 2.0;
            self.menuView.hidden = YES;
            
            // اسم القائمة
            UILabel *menuName = [[UILabel alloc] initWithFrame:CGRectMake(10, 10, 230, 25)];
            menuName.text = @"MUSTACHE AUTO TOUCH";
            menuName.textColor = [UIColor whiteColor];
            menuName.textAlignment = NSTextAlignmentCenter;
            menuName.font = [UIFont boldSystemFontOfSize:13];
            [self.menuView addSubview:menuName];
            
            // زر "➕ اضافه هدف"
            UIButton *addTargetBtn = [UIButton buttonWithType:UIButtonTypeCustom];
            addTargetBtn.frame = CGRectMake(25, 45, 200, 34);
            addTargetBtn.backgroundColor = [UIColor whiteColor];
            [addTargetBtn setTitle:@"➕ اضافه هدف" forState:UIControlStateNormal];
            [addTargetBtn setTitleColor:[UIColor blackColor] forState:UIControlStateNormal];
            addTargetBtn.titleLabel.font = [UIFont boldSystemFontOfSize:12];
            addTargetBtn.layer.cornerRadius = 8;
